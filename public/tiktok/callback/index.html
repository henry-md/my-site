<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok OAuth Callback</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(720px, 100%);
        border: 1px solid #d8dee6;
        border-radius: 8px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 16px 48px rgba(23, 32, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
        line-height: 1.2;
      }

      p {
        margin: 0 0 18px;
        color: #4b5563;
        line-height: 1.5;
      }

      dl {
        margin: 0;
      }

      dt {
        margin: 18px 0 8px;
        font-weight: 700;
      }

      dd {
        margin: 0;
      }

      code,
      pre {
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      pre {
        margin: 0;
        padding: 14px;
        overflow-x: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        border: 1px solid #cad2dc;
        border-radius: 6px;
        background: #f2f4f7;
        color: #111827;
      }

      button {
        margin-top: 10px;
        border: 1px solid #17202a;
        border-radius: 6px;
        background: #17202a;
        color: #ffffff;
        padding: 8px 12px;
        font: inherit;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.72;
      }

      .error {
        border-color: #f0b7b7;
        background: #fff8f8;
      }

      .muted {
        color: #6b7280;
        font-size: 0.95rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #111827;
          color: #f9fafb;
        }

        main {
          border-color: #374151;
          background: #1f2937;
          box-shadow: none;
        }

        p,
        .muted {
          color: #cbd5e1;
        }

        pre {
          border-color: #4b5563;
          background: #111827;
          color: #f9fafb;
        }

        button {
          border-color: #f9fafb;
          background: #f9fafb;
          color: #111827;
        }

        .error {
          border-color: #7f1d1d;
          background: #2b1518;
        }
      }
    </style>
  </head>
  <body>
    <main id="callback-card" aria-live="polite">
      <h1 id="title">TikTok OAuth Callback</h1>
      <p id="message">Reading authorization response...</p>
      <section id="details"></section>
    </main>

    <script>
      (function renderTikTokCallback() {
        const card = document.getElementById('callback-card');
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const details = document.getElementById('details');

        function getParams() {
          try {
            return new URLSearchParams(window.location.search || '');
          } catch {
            return new URLSearchParams();
          }
        }

        function appendCodeBlock(label, value, options) {
          const term = document.createElement('dt');
          term.textContent = label;

          const description = document.createElement('dd');
          const pre = document.createElement('pre');
          const code = document.createElement('code');
          code.textContent = value || '(missing)';
          pre.appendChild(code);
          description.appendChild(pre);

          if (options && options.copy) {
            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = 'Copy auth code';
            button.addEventListener('click', async () => {
              try {
                await navigator.clipboard.writeText(value);
                button.textContent = 'Copied';
                button.disabled = true;
                window.setTimeout(() => {
                  button.textContent = 'Copy auth code';
                  button.disabled = false;
                }, 1600);
              } catch {
                button.textContent = 'Select and copy manually';
              }
            });
            description.appendChild(button);
          }

          return [term, description];
        }

        function appendParamList(params) {
          const entries = Array.from(params.entries());
          const list = document.createElement('dl');

          if (entries.length === 0) {
            const note = document.createElement('p');
            note.className = 'muted';
            note.textContent = 'No query parameters were received.';
            details.appendChild(note);
            return;
          }

          entries.forEach(([key, value]) => {
            appendCodeBlock(key, value).forEach((node) => list.appendChild(node));
          });

          details.appendChild(list);
        }

        const params = getParams();
        const authCode = params.get('auth_code') || '';
        const state = params.get('state') || '';
        const error = params.get('error') || '';
        const errorDescription = params.get('error_description') || '';

        details.replaceChildren();

        if (error || errorDescription) {
          card.classList.add('error');
          title.textContent = 'TikTok authorization error';
          message.textContent = 'TikTok redirected back with an error response.';

          const list = document.createElement('dl');
          appendCodeBlock('error', error).forEach((node) => list.appendChild(node));
          appendCodeBlock('error_description', errorDescription).forEach((node) => list.appendChild(node));
          if (state) {
            appendCodeBlock('state', state).forEach((node) => list.appendChild(node));
          }
          details.appendChild(list);
          return;
        }

        if (authCode) {
          title.textContent = 'TikTok authorization code received';
          message.textContent = 'This code is short-lived. Exchange it for an access token and refresh token immediately.';

          const list = document.createElement('dl');
          appendCodeBlock('auth_code', authCode, { copy: true }).forEach((node) => list.appendChild(node));
          if (state) {
            appendCodeBlock('state', state).forEach((node) => list.appendChild(node));
          }
          details.appendChild(list);
          return;
        }

        title.textContent = 'No authorization code found';
        message.textContent = 'TikTok did not include auth_code or error details in this callback URL.';
        appendParamList(params);
      })();
    </script>
  </body>
</html>
